name: CI

on:
  push:
    branches: [main, master, develop]
    paths-ignore: ['**.md']
  pull_request:
    branches: [main, master, develop]
    paths-ignore: ['**.md']

permissions:
  contents: read

jobs:
  format:
    name: Code Style
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven
      - run: make format-check

  test:
    name: Test
    runs-on: ubuntu-22.04
    needs: [format]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven
      - run: make test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: target/surefire-reports/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-22.04
    needs: [format, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven
      - run: make build
